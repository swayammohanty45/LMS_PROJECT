{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Lesson - {{ course.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Add Lesson to Course: <b>{{ course.title }}</b></h2>
    <a href="{% url 'instr_dashboard' %}" class="btn btn-secondary mb-2">Back to Dashboard</a>

    <div class="card shadow p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="title" class="form-label">Lesson Title</label>
                <input type="text" name="title" id="title" class="form-control" required maxlength="100">
            </div>
            <div class="mb-3">
                <label for="text" class="form-label">Lesson Text</label>
                <textarea name="text" id="text" class="form-control" rows="5" required></textarea>
            </div>
            <div class="mb-3">
                <label for="video" class="form-label">Video URL (optional)</label>
                <input type="text" name="video" id="video" class="form-control" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-primary">Add Lesson</button>
        </form>
    </div>
</div>
</body>
</html>
