{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ quiz.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .question-card { display: none; }   
    .question-card.active { display: block; } 
  </style>
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4>{{ quiz.title }}</h4>
    </div>
    <div class="card-body">
      <form method="POST" id="quizForm">
        {% csrf_token %}
        
        {% for q in questions %}
          <div class="mb-4 question-card {% if forloop.first %}active{% endif %}" id="q{{ q.id }}">
            <p class="fw-bold">{{ forloop.counter }}. {{ q.text }}</p>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="q{{ q.id }}" value="A" id="q{{ q.id }}A" required>
              <label class="form-check-label" for="q{{ q.id }}A">{{ q.optionA }}</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="q{{ q.id }}" value="B" id="q{{ q.id }}B">
              <label class="form-check-label" for="q{{ q.id }}B">{{ q.optionB }}</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="q{{ q.id }}" value="C" id="q{{ q.id }}C">
              <label class="form-check-label" for="q{{ q.id }}C">{{ q.optionC }}</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="q{{ q.id }}" value="D" id="q{{ q.id }}D">
              <label class="form-check-label" for="q{{ q.id }}D">{{ q.optionD }}</label>
            </div>

            <button type="button" class="btn btn-primary mt-3 next-btn">
              {% if forloop.last %}Finish Quiz{% else %}Next{% endif %}
            </button>
          </div>
        {% empty %}
          <p>No questions in this quiz yet.</p>
        {% endfor %}

        <button type="submit" id="submitBtn" class="btn btn-success" style="display:none;">Submit Quiz</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    let currentQuestion = 0;
    const questions = document.querySelectorAll(".question-card");
    const totalQuestions = questions.length;

    document.querySelectorAll(".next-btn").forEach((btn, index) => {
      btn.addEventListener("click", function () {
        // Ensure user selects an option before moving forward
        let selected = questions[index].querySelector("input[type=radio]:checked");
        if (!selected) {
          alert("Please select an answer before proceeding!");
          return;
        }
        // Hide current question
        questions[index].classList.remove("active");
        if (index + 1 < totalQuestions) {
          // Show next question
          questions[index + 1].classList.add("active");
        } else {
          // Last question reached → show submit button
          document.getElementById("submitBtn").style.display = "inline-block";
        }
      });
    });
  });
</script>

</body>
</html>
