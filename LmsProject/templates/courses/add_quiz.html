{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Add Quiz for Lesson: {{ lesson.title }}</h2>
  <hr>
  
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    
    <div class="mb-3">
      <label for="title" class="form-label">Quiz Title</label>
      <input type="text" class="form-control" id="title" name="title" required>
    </div>

    <h4>Questions</h4>
    <hr>

    {% for i in "12"|make_list %}
    <div class="mb-4 border p-3 rounded">
      <h5>Question {{ i }}</h5>
      <div class="mb-2">
        <label class="form-label">Question Text</label>
        <input type="text" class="form-control" name="question_{{ i }}">
      </div>
      <div class="row">
        <div class="col-md-6 mb-2">
          <label class="form-label">Option A</label>
          <input type="text" class="form-control" name="optionA_{{ i }}">
        </div>
        <div class="col-md-6 mb-2">
          <label class="form-label">Option B</label>
          <input type="text" class="form-control" name="optionB_{{ i }}">
        </div>
        <div class="col-md-6 mb-2">
          <label class="form-label">Option C</label>
          <input type="text" class="form-control" name="optionC_{{ i }}">
        </div>
        <div class="col-md-6 mb-2">
          <label class="form-label">Option D</label>
          <input type="text" class="form-control" name="optionD_{{ i }}">
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label">Correct Answer (A/B/C/D)</label>
        <input type="text" class="form-control" name="answer_{{ i }}" maxlength="1">
      </div>
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Save Quiz</button>
    <a href="{% url 'instr_dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
