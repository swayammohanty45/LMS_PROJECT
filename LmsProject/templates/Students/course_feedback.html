{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Feedback for {{ course.title }}</h2>

  {% if existing_feedback %}
    <p><strong>Your previous feedback:</strong></p>
    <div class="alert alert-info">{{ existing_feedback.feedback }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="feedback" class="form-label">Write your feedback</label>
      <textarea class="form-control" id="feedback" name="feedback" rows="4" required>{% if existing_feedback %}{{ existing_feedback.feedback }}{% endif %}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Submit Feedback</button>
    <a href="{% url 'student_my_courses' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
